<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐美文化内部学习资料</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: linear-gradient(135deg, #eef3fb 0%, #f9fbff 32%, #e8e9ff 64%, #f5fbff 100%);
            --glass: linear-gradient(145deg, rgba(255,255,255,.70), rgba(255,255,255,.34));
            --glass-strong: rgba(255,255,255,.76);
            --glass-border: rgba(255,255,255,.66);
            --hairline: rgba(29,29,31,.08);
            --text: #17171a;
            --muted: #666872;
            --faint: #8b8d97;
            --accent: #0071e3;
            --danger: #ff3b30;
            --success: #24a854;
            --shadow: 0 24px 80px rgba(31,41,55,.11), inset 0 1px 0 rgba(255,255,255,.58);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --max: 1180px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: linear-gradient(135deg, #06070a 0%, #111827 38%, #1e1b4b 72%, #080a0f 100%);
                --glass: linear-gradient(145deg, rgba(36,37,44,.74), rgba(18,19,24,.50));
                --glass-strong: rgba(34,35,42,.84);
                --glass-border: rgba(255,255,255,.14);
                --hairline: rgba(255,255,255,.09);
                --text: #f5f5f7;
                --muted: #a4a6b0;
                --faint: #7f828c;
                --accent: #2997ff;
                --shadow: 0 24px 84px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.08);
            }
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            margin: 0;
            padding: 34px 18px 60px;
            color: var(--text);
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.72;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
        }
        body::before, body::after { content: ""; position: fixed; pointer-events: none; }
        body::before { inset: 0; z-index: -3; background: var(--page-bg); }
        body::after {
            inset: -18%;
            z-index: -2;
            background:
                radial-gradient(circle at 16% 18%, rgba(0,113,227,.23), transparent 31%),
                radial-gradient(circle at 82% 10%, rgba(124,58,237,.18), transparent 30%),
                radial-gradient(circle at 48% 88%, rgba(52,199,89,.13), transparent 34%),
                radial-gradient(circle at 90% 72%, rgba(255,149,0,.10), transparent 28%);
            filter: blur(44px) saturate(145%);
        }
        a { color: inherit; text-decoration: none; }
        .container { width: min(100%, var(--max)); margin: 0 auto; }
        body.locked { overflow: hidden; }
        body.locked .container { filter: blur(18px) saturate(.85); transform: scale(.985); user-select: none; pointer-events: none; }
        .gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(245,248,255,.36);
            backdrop-filter: blur(34px) saturate(180%);
            -webkit-backdrop-filter: blur(34px) saturate(180%);
        }
        .gate-panel {
            width: min(100%, 430px);
            padding: 28px;
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            background: var(--glass);
            box-shadow: var(--shadow);
        }
        .gate-panel h2 { margin: 0 0 8px; font-size: 1.55rem; line-height: 1.25; }
        .gate-panel p { margin: 0 0 18px; color: var(--muted); }
        .gate-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
        .gate input, .search {
            min-height: 46px;
            min-width: 0;
            border: 1px solid var(--hairline);
            border-radius: 14px;
            padding: 0 14px;
            color: var(--text);
            background: rgba(255,255,255,.34);
            font: inherit;
            outline: none;
        }
        .gate input:focus, .search:focus { border-color: rgba(0,113,227,.55); box-shadow: 0 0 0 4px rgba(0,113,227,.12); }
        .gate button {
            min-height: 46px;
            border: 0;
            border-radius: 14px;
            padding: 0 18px;
            color: white;
            background: var(--accent);
            font: inherit;
            font-weight: 720;
            cursor: pointer;
        }
        .gate-error { min-height: 22px; margin-top: 10px; color: var(--danger); font-size: .9rem; }
        body:not(.locked) .gate { display: none; }
        .hero { min-height: 36vh; display: grid; align-content: end; gap: 14px; padding: 56px 4px 34px; }
        h1 {
            max-width: 1000px;
            margin: 0;
            font-size: clamp(2.45rem, 5vw, 5.2rem);
            line-height: .98;
            font-weight: 780;
            letter-spacing: 0;
            text-wrap: balance;
        }
        .subtitle { max-width: 860px; margin: 0; color: var(--muted); font-size: clamp(1.06rem,1.8vw,1.28rem); text-wrap: pretty; }
        .toolbar {
            position: sticky;
            top: 12px;
            z-index: 30;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin: 8px 0 18px;
            padding: 10px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: rgba(255,255,255,.40);
            box-shadow: 0 12px 42px rgba(31,41,55,.07);
            backdrop-filter: blur(26px) saturate(175%);
            -webkit-backdrop-filter: blur(26px) saturate(175%);
        }
        .toggle { display: flex; align-items: center; gap: 8px; padding: 0 12px; border-radius: 14px; border: 1px solid var(--hairline); color: var(--muted); background: rgba(255,255,255,.24); white-space: nowrap; font-size: .9rem; }
        .nav { display: flex; gap: 8px; margin-bottom: 28px; overflow-x: auto; scrollbar-width: none; }
        .nav::-webkit-scrollbar { display: none; }
        .nav a {
            flex: 0 0 auto;
            max-width: 300px;
            padding: 9px 12px;
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            background: rgba(255,255,255,.28);
            color: var(--muted);
            font-size: .88rem;
            font-weight: 680;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            backdrop-filter: blur(18px) saturate(150%);
            -webkit-backdrop-filter: blur(18px) saturate(150%);
        }
        .nav a:hover { color: var(--text); background: rgba(255,255,255,.42); }
        .glass-card {
            position: relative;
            margin: 0 0 34px;
            padding: clamp(24px, 4vw, 42px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            background: var(--glass);
            box-shadow: var(--shadow);
            backdrop-filter: blur(30px) saturate(175%);
            -webkit-backdrop-filter: blur(30px) saturate(175%);
            overflow: clip;
        }
        .glass-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(120deg, rgba(255,255,255,.34), transparent 38%, rgba(255,255,255,.08) 72%, transparent);
            opacity: .72;
            pointer-events: none;
        }
        .glass-card > * { position: relative; }
        h2 {
            margin: 0 0 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--hairline);
            font-size: clamp(1.35rem, 2.5vw, 2rem);
            line-height: 1.25;
            font-weight: 760;
            letter-spacing: 0;
            text-wrap: balance;
        }
        .doc-lines { display: grid; gap: 8px; }
        .doc-line {
            margin: 0;
            padding: 9px 12px;
            border-radius: 13px;
            color: var(--text);
            overflow-wrap: anywhere;
            text-wrap: pretty;
        }
        .doc-line:hover { background: rgba(255,255,255,.18); }
        .main-heading { font-size: 1.18rem; font-weight: 780; }
        .sub-heading { font-size: 1.07rem; font-weight: 750; }
        .step-line strong { color: var(--accent); }
        .label-line strong, .term-line strong { color: var(--success); }
        .bullet-line { padding-left: 18px; }
        .block-title { font-weight: 760; color: var(--accent); }
        .hidden { display: none !important; }
        .compact .doc-lines { gap: 2px; }
        .compact .doc-line { padding-block: 4px; }
        mark { border-radius: 5px; padding: 0 2px; color: inherit; background: rgba(255,214,10,.38); }
        .footer-note { padding: 24px 0 0; color: var(--faint); text-align: center; font-size: .9rem; }
        @media (prefers-color-scheme: dark) {
            .toolbar, .nav a { background: rgba(18,19,24,.42); }
            .gate { background: rgba(4, 6, 12, .46); }
            .gate input, .search { background: rgba(18,19,24,.46); }
            body::after {
                background:
                    radial-gradient(circle at 16% 18%, rgba(41,151,255,.16), transparent 31%),
                    radial-gradient(circle at 80% 12%, rgba(124,58,237,.18), transparent 32%),
                    radial-gradient(circle at 48% 86%, rgba(52,199,89,.08), transparent 34%);
            }
        }
        @media (max-width: 760px) {
            body { padding: 18px 12px 44px; }
            .hero { min-height: 30vh; padding-top: 36px; }
            .toolbar { top: 8px; grid-template-columns: 1fr; }
            .toggle { min-height: 40px; justify-content: center; }
            .gate-row { grid-template-columns: 1fr; }
            .doc-line { padding: 10px 8px; }
        }
        @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
    </style>
</head>

    <script>
        const gateForm = document.getElementById('gate-form');
        const gatePassword = document.getElementById('gate-password');
        const gateError = document.getElementById('gate-error');
        const content = document.getElementById('content');
        const encryptedPayload = JSON.parse(document.getElementById('encrypted-content').textContent);
        function fromBase64(value) {
            const binary = atob(value);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes;
        }
        async function deriveKey(password, salt, iterations) {
            const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations, hash: 'SHA-256' }, material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
        }
        async function decryptContent(password) {
            const salt = fromBase64(encryptedPayload.salt);
            const iv = fromBase64(encryptedPayload.iv);
            const tag = fromBase64(encryptedPayload.tag);
            const data = fromBase64(encryptedPayload.data);
            const sealed = new Uint8Array(data.length + tag.length);
            sealed.set(data);
            sealed.set(tag, data.length);
            const key = await deriveKey(password, salt, encryptedPayload.iterations);
            const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv, tagLength: 128 }, key, sealed);
            return new TextDecoder().decode(plain);
        }
        function initializeReaderTools() {
            const search = document.getElementById('search');
            const compact = document.getElementById('compact');
            const sections = Array.from(document.querySelectorAll('.doc-section'));
            const lines = Array.from(document.querySelectorAll('.doc-line'));
            const original = new Map(lines.map(line => [line, line.querySelector('.line-text').innerHTML]));
            function escapeRegExp(value) { return value.replace(/[.*+?^${}()|[]\]/g, '\$&'); }
            search.addEventListener('input', () => {
                const q = search.value.trim();
                const rx = q ? new RegExp(escapeRegExp(q), 'gi') : null;
                for (const line of lines) {
                    const textEl = line.querySelector('.line-text');
                    const raw = original.get(line);
                    textEl.innerHTML = raw;
                    const plain = line.textContent;
                    const hit = !q || plain.includes(q);
                    line.classList.toggle('hidden', !hit);
                    if (hit && rx) textEl.innerHTML = raw.replace(rx, match => `<mark>${match}</mark>`);
                }
                for (const section of sections) {
                    const visible = section.querySelector('.doc-line:not(.hidden)');
                    section.classList.toggle('hidden', !visible);
                }
            });
            compact.addEventListener('change', () => document.body.classList.toggle('compact', compact.checked));
        }
        gatePassword.focus();
        gateForm.addEventListener('submit', async event => {
            event.preventDefault();
            gateError.textContent = '';
            const button = gateForm.querySelector('button');
            button.disabled = true;
            button.textContent = '解锁中';
            try {
                content.innerHTML = await decryptContent(gatePassword.value);
                initializeReaderTools();
                document.body.classList.remove('locked');
                gatePassword.value = '';
            } catch (error) {
                gateError.textContent = '密码错误，或内容无法解密。';
                gatePassword.select();
            } finally {
                button.disabled = false;
                button.textContent = '进入';
            }
        });
    </script>
